repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/RobertCraiworthy/pyright-python
    rev: v1.1.393
    hooks:
      - id: pyright
        additional_dependencies:
          - fastapi
          - pydantic
          - pydantic-settings
          - loguru
          - uvicorn
